add_treatment:
  name: Add treatment
  description: Record a chemical treatment applied to the pool.
  fields:
    device_id:
      name: Pool device
      description: The pool to apply the treatment to.
      required: true
      selector:
        device:
          integration: poolman
    product:
      name: Product
      description: The chemical product used for treatment.
      required: true
      selector:
        select:
          translation_key: chemical_product
          options:
            - "ph_minus"
            - "ph_plus"
            - "chlore_choc"
            - "galet_chlore"
            - "neutralizer"
            - "tac_plus"
            - "salt"
            - "bromine_tablet"
            - "bromine_shock"
            - "active_oxygen_tablet"
            - "active_oxygen_activator"
            - "flocculant"
            - "anti_algae"
            - "stabilizer"
            - "clarifier"
            - "metal_sequestrant"
            - "calcium_hardness_increaser"
            - "winterizing_product"
    quantity_g:
      name: Quantity
      description: Amount of product used in grams.
      selector:
        number:
          min: 0
          step: 1
          unit_of_measurement: g
          mode: box
    spoons:
      name: Spoons
      description: Number of measuring spoons used. Requires spoon_name to be set.
      selector:
        number:
          min: 0
          step: 0.5
          mode: box
    spoon_name:
      name: Spoon name
      description: Name of the configured measuring spoon to use.
      selector:
        text:
    notes:
      name: Notes
      description: Optional notes about the treatment.
      selector:
        text:

record_measure:
  name: Record measure
  description: Record a manual water chemistry measurement.
  fields:
    device_id:
      name: Pool device
      description: The pool to record the measurement for.
      required: true
      selector:
        device:
          integration: poolman
    parameter:
      name: Parameter
      description: The water parameter being measured.
      required: true
      selector:
        select:
          translation_key: measure_parameter
          options:
            - "ph"
            - "orp"
            - "tac"
            - "cya"
            - "hardness"
            - "temperature"
    value:
      name: Value
      description: The measured value.
      required: true
      selector:
        number:
          mode: box
    notes:
      name: Notes
      description: Optional notes about the measurement.
      selector:
        text:

boost_filtration:
  name: Boost filtration
  description: Activate a manual filtration boost for extra continuous pump time.
  fields:
    device_id:
      name: Pool device
      description: The pool to boost filtration for.
      required: true
      selector:
        device:
          integration: poolman
    hours:
      name: Duration (hours)
      description: Number of extra filtration hours to add. Set to 0 to cancel an active boost.
      required: true
      selector:
        number:
          min: 0
          max: 48
          step: 0.5
          unit_of_measurement: h
          mode: box

confirm_activation_step:
  name: Confirm activation step
  description: Confirm completion of an activation wizard step.
  fields:
    device_id:
      name: Pool device
      description: The pool to confirm the activation step for.
      required: true
      selector:
        device:
          integration: poolman
    step:
      name: Step
      description: The activation step to confirm as completed.
      required: true
      selector:
        select:
          translation_key: activation_step
          options:
            - "remove_cover"
            - "raise_water_level"
            - "clean_pool_and_filter"
            - "shock_treatment"
            - "intensive_filtration"
